name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts

    - name: Sync source to server
      run: |
        SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
        TARGET="${{ secrets.USERNAME }}@${{ secrets.HOST }}:~/baitengfei"
        rsync -az --delete \
          --exclude='.git' \
          --exclude='node_modules' \
          --exclude='.next' \
          -e "$SSH" ./ "$TARGET/"

    - name: Build and restart on server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        timeout: 300s
        script: |
          export NVM_DIR="$HOME/.nvm"
          source "$NVM_DIR/nvm.sh"
          nvm use 18
          cd ~/baitengfei
          npm install --omit=dev
          npm run build
          pm2 restart baitengfei || pm2 start npm --name "baitengfei" -- start
          pm2 save
          echo "✅ 部署完成"
          pm2 status baitengfei
