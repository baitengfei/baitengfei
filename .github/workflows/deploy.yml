name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npm run build

    - name: Upload build to server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        source: ".next,posts,public,package.json,next.config.mjs"
        target: "/root/baitengfei"
        overwrite: true
        timeout: 60s

    - name: Restart PM2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        timeout: 30s
        script: |
          cd /root/baitengfei
          npm ci --omit=dev
          pm2 restart baitengfei || pm2 start npm --name "baitengfei" -- start
          pm2 save
          echo "✅ 部署完成"
          pm2 status baitengfei
