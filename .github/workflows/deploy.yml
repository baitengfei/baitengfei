name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        timeout: 120s
        command_timeout: 10m
        script: |
          set -e

          # 初始化仓库（首次部署）
          if [ ! -d "/home/ubuntu/baitengfei/.git" ]; then
            git clone https://github.com/baitengfei/baitengfei.git /home/ubuntu/baitengfei
          fi

          cd /home/ubuntu/baitengfei

          # 拉取最新代码
          git pull origin main

          # 安装依赖
          npm ci --production=false

          # 构建
          npm run build

          # 启动或重启 PM2
          if pm2 describe baitengfei > /dev/null 2>&1; then
            pm2 restart baitengfei
          else
            pm2 start npm --name "baitengfei" -- start
            pm2 save
          fi

          echo "✅ 部署完成"
          pm2 status baitengfei
